<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Khalil — phone / tablet / desktop</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=Bungee&family=Russo+One&family=Anton&family=Caveat:wght@500;600;700&family=Permanent+Marker&display=swap" rel="stylesheet" />
<style>
  html, body { margin:0; padding:0; background:#f0eee9; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
</style>
</head>
<body>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="browser-window.jsx"></script>
<script type="text/babel" src="directions/lib.jsx"></script>
<script type="text/babel" src="directions/shared.jsx"></script>
<script type="text/babel" src="directions/topbar.jsx"></script>
<script type="text/babel" src="directions/arena.jsx"></script>
<script type="text/babel" src="directions/tunnel.jsx"></script>
<script type="text/babel" src="directions/edit.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard, DCPostIt, IOSDevice, ChromeWindow, Defer, LoadingPanel } = window;

// Phone frame: iPhone bezel.
const Phone = ({ children }) => (
  <div style={{ padding: 18 }}>
    <IOSDevice width={402} height={874} dark>{children}</IOSDevice>
  </div>
);

// Tablet: bare iPad-shaped rounded rect, content scrolls internally.
const Tablet = ({ children }) => (
  <div style={{ padding: 18 }}>
    <div style={{
      width: 820, height: 1180,
      borderRadius: 36, overflow: 'hidden',
      background: '#000',
      boxShadow: '0 40px 80px rgba(0,0,0,0.25), 0 0 0 1px rgba(0,0,0,0.12)',
      position: 'relative',
    }}>
      <div style={{ position: 'absolute', inset: 0, overflow: 'auto' }}>
        {children}
      </div>
    </div>
  </div>
);

// Desktop: a real browser chrome.
const Desktop = ({ url, children }) => (
  <div style={{ padding: 18 }}>
    <ChromeWindow
      tabs={[{ title: 'khalil.gg', active: true }, { title: '+', active: false }]}
      url={url}
      width={1280} height={800}
    >
      <div style={{ width: '100%', height: '100%', overflow: 'auto' }}>
        {children}
      </div>
    </ChromeWindow>
  </div>
);

// Wrap each heavy prototype in a Defer with a placeholder so the 6 don't
// all mount synchronously and lock up the main thread.
const Slot = ({ ms, children }) => (
  <Defer ms={ms} placeholder={<LoadingPanel />}>{children}</Defer>
);

const App = () => (
  <DesignCanvas>
    <DCPostIt x={32} y={120} rotation={-2}>
      {`two directions × three sizes.\nscroll inside each phone/tablet/\nbrowser. flip the gaming/football\ntoggle to morph the whole thing.\n\nthe tunnel is scroll-driven —\nwalk through, hit subscribe.`}
    </DCPostIt>

    {/* C — Arena (the one you liked). Three sizes. */}
    <DCSection
      id="arena"
      title="C · Arena"
      subtitle="full-bleed dual-mode HUD · neon gaming bunker / night stadium"
    >
      <DCArtboard id="arena-phone"   label="Phone"   width={440}  height={912}>
        <Phone><Slot ms={0}><window.ArenaMobile /></Slot></Phone>
      </DCArtboard>
      <DCArtboard id="arena-tablet"  label="Tablet"  width={856}  height={1216}>
        <Tablet><Slot ms={250}><window.ArenaTablet /></Slot></Tablet>
      </DCArtboard>
      <DCArtboard id="arena-desktop" label="Desktop" width={1316} height={836}>
        <Desktop url="khalil.gg"><Slot ms={500}><window.ArenaDesktop /></Slot></Desktop>
      </DCArtboard>
    </DCSection>

    {/* D — Tunnel. Scroll-driven 3D walkout. Three sizes. */}
    <DCSection
      id="tunnel"
      title="D · Tunnel walkout"
      subtitle="scroll-driven 3D world · gaming corridor / Bernabéu player tunnel — walk through, scroll into the destination"
    >
      <DCArtboard id="tunnel-phone"   label="Phone"   width={440}  height={912}>
        <Phone><Slot ms={800}><window.TunnelMobile /></Slot></Phone>
      </DCArtboard>
      <DCArtboard id="tunnel-tablet"  label="Tablet"  width={856}  height={1216}>
        <Tablet><Slot ms={1100}><window.TunnelTablet /></Slot></Tablet>
      </DCArtboard>
      <DCArtboard id="tunnel-desktop" label="Desktop" width={1316} height={836}>
        <Desktop url="khalil.gg"><Slot ms={1400}><window.TunnelDesktop /></Slot></Desktop>
      </DCArtboard>
    </DCSection>

    {/* E — Edit experience. "Khalil Control Deck" — mission-control aesthetic. */}
    <DCSection
      id="edit"
      title="E · Edit · Control Deck"
      subtitle="not a CMS · mission control · type your message into a missile, set fuse + payload, slam the plunger, watch it explode in the launch window"
    >
      <DCArtboard id="edit-phone"   label="Phone"   width={440}  height={1280}>
        <Phone><Slot ms={1700}><window.EditMobile /></Slot></Phone>
      </DCArtboard>
      <DCArtboard id="edit-tablet"  label="Tablet"  width={856}  height={1400}>
        <Tablet><Slot ms={2000}><window.EditTablet /></Slot></Tablet>
      </DCArtboard>
      <DCArtboard id="edit-desktop" label="Desktop" width={1316} height={1020}>
        <Desktop url="khalil.gg/edit"><Slot ms={2300}><window.EditDesktop /></Slot></Desktop>
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
